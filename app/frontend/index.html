<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Native Blogging Platform</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #fff;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            width: 500px;
        }

        h1 {
            color: #0077cc;
            margin-bottom: 15px;
        }

        h2 {
            color: #555;
            margin-bottom: 25px;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            background: #0077cc;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #005fa3;
        }

        #result {
            margin-top: 20px;
            font-size: 18px;
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Cloud Native Blogging Platform</h1>
        <h2>Frontend Running Successfully</h2>

        <button onclick="loadData()">Get Backend Response</button>

        <p id="result"></p>
    </div>

    <script>
        async function loadData() {
            try {
                const res = await fetch("http://YOUR_APP_IP:5000");
                const data = await res.text();

                document.getElementById("result").innerHTML = data;
            } catch (error) {
                document.getElementById("result").innerHTML = "Unable to connect to backend!";
            }
        }
    </script>

</body>
</html>
