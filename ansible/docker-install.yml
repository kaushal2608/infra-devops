---
- hosts: web
  become: true

  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Start Docker
      service:
        name: docker
        state: started

    - name: Enable Docker
      service:
        name: docker
        enabled: yes

    - name: Verify Docker
      command: docker --version
      register: docker_version

    - name: Print Docker Version
      debug:
        var: docker_version.stdout